<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kedai Jamoe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="bg-slate-100">

<!-- LOGIN PAGE -->
<div id="loginPage" class="min-h-screen flex items-center justify-center p-4">
  <div class="bg-white p-6 rounded-xl w-full max-w-md shadow">

    <h1 class="text-2xl font-bold text-center mb-6">Kedai Jamoe</h1>

    <input id="email" type="email" placeholder="Email"
      class="w-full mb-3 p-3 border rounded-lg">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-3 border rounded-lg">

    <button onclick="login()"
      class="w-full bg-orange-500 text-white py-3 rounded-lg">
      Masuk
    </button>

    <button onclick="register()"
      class="w-full mt-2 text-sm text-gray-500">
      Daftar akun baru
    </button>

  </div>
</div>


<!-- MAIN APP -->
<div id="app" class="hidden p-4">

  <!-- NAVBAR -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3">
  <button onclick="goTo('home')">Home</button>
  <button onclick="goTo('transaksi')">Transaksi</button>
  <button onclick="goTo('produk')">Produk</button>
  <button onclick="goTo('laporan')">Laporan</button>
</div>

<!-- CONTENT -->
<div class="pb-20 space-y-20">

  <section id="home" class="min-h-screen">
    <h1 class="text-xl font-bold mb-4">Home</h1>
    <p>Ini halaman beranda</p>
  </section>

  <section id="transaksi" class="min-h-screen">
    <h1 class="text-xl font-bold mb-4">Transaksi</h1>
  </section>

  <section id="produk" class="min-h-screen">
    <h1 class="text-xl font-bold mb-4">Produk</h1>
  </section>

  <section id="laporan" class="min-h-screen">
    <h1 class="text-xl font-bold mb-4">Laporan</h1>
  </section>

</div>

</div>


<script>
/* =========================
   CONFIG SUPABASE
========================= */

// 🔴 GANTI INI
const SUPABASE_URL = "https://YOUR_PROJECT_ID.supabase.co";
const SUPABASE_KEY = "YOUR_PUBLISHABLE_KEY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);


/* =========================
   AUTH FUNCTION
========================= */

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alert(error.message);
  }
}

async function register() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Cek email untuk verifikasi");
  }
}

async function logout() {
  await supabase.auth.signOut();
}

function goTo(id) {
  const el = document.getElementById(id);
  if (el) {
    el.scrollIntoView({
      behavior: "smooth"
    });
  }
}  

/* =========================
   SESSION CHECK
========================= */

supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    showApp();
  } else {
    showLogin();
  }
});

function showApp() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

function showLogin() {
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("app").classList.add("hidden");
}

</script>

</body>
</html>
